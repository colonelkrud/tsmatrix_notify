name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Helm lint
        run: helm lint charts/tsmatrix-notify
      - name: Helm template (defaults)
        run: helm template tsmatrix-notify charts/tsmatrix-notify
      - name: Helm template (secret example)
        run: |
          helm template tsmatrix-notify charts/tsmatrix-notify \
            --set secret.create=true \
            --set secret.matrixAccessToken=dummy \
            --set secret.ts3User=dummy \
            --set secret.ts3Password=dummy \
            --set config.matrixHomeserver=https://matrix.example.org \
            --set config.matrixUserId='@bot:example.org' \
            --set config.matrixRoomId='!room:example.org'
