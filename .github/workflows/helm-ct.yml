name: Helm chart-testing
on:
  push:
    branches: [main]
    paths:
      - 'charts/**'
      - '.github/ct/**'
      - '.github/workflows/helm-ct.yml'
  pull_request:
    paths:
      - 'charts/**'
      - '.github/ct/**'
      - '.github/workflows/helm-ct.yml'

permissions:
  contents: read

jobs:
  ct-lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Verify target branch availability
        run: |
          git remote -v
          git fetch --prune origin main
          git branch -a
          git rev-parse --verify origin/main
      - uses: helm/chart-testing-action@v2.6.1
      - name: Detect changed charts
        id: changed
        if: github.event_name == 'pull_request'
        run: |
          changed="$(ct list-changed --config .github/ct/ct.yaml --target-branch main)"
          echo "changed<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -n "$changed" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Lint changed charts
        if: github.event_name == 'pull_request' && steps.changed.outputs.has_changes == 'true'
        run: ct lint --config .github/ct/ct.yaml --target-branch main
      - name: No chart changes detected
        if: github.event_name == 'pull_request' && steps.changed.outputs.has_changes != 'true'
        run: echo "No chart changes detected; skipping ct lint."
      - name: Lint all charts on push
        if: github.event_name == 'push'
        run: ct lint --config .github/ct/ct.yaml --all
